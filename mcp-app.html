<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Audio File</title>
  </head>
  <body>
    <header id="top">
      <button id="play-pause" type="button" disabled aria-label="Play">
        <svg class="ic ic-play" viewBox="0 0 12 12" width="14" height="14" aria-hidden="true">
          <path d="M3 2 L10 6 L3 10 Z" fill="currentColor"/>
        </svg>
        <svg class="ic ic-pause" viewBox="0 0 12 12" width="14" height="14" aria-hidden="true">
          <rect x="3" y="2" width="2.5" height="8" fill="currentColor"/>
          <rect x="6.5" y="2" width="2.5" height="8" fill="currentColor"/>
        </svg>
      </button>
      <div id="info">
        <div id="info-primary">
          <span class="meta-part filename" id="md-filename" title=""></span>
          <span class="meta-part" id="md-type"></span>
          <span class="meta-part" id="md-size"></span>
        </div>
        <div id="info-secondary">
          <div id="info-secondary-meta">
            <span class="meta-part" id="md-channels"></span>
            <span class="meta-part" id="md-format"></span>
          </div>
          <div id="time-display">
            <span id="position">00:00.000</span> / <span id="duration">00:00.000</span>
          </div>
        </div>
      </div>
    </header>
    <div id="seek-bar">
      <canvas id="waveform"></canvas>
      <div id="spectrogram-wrap"><canvas id="spectrogram"></canvas></div>
      <div id="playhead"></div>
      <div id="loop-region" hidden></div>
      <div id="stats-sample" hidden>
        <span class="stat-time" id="s-time">00:00.000</span>
        <span class="stat"><span class="k">pk</span><span class="v" id="s-peak">—</span></span>
        <span class="stat"><span class="k">RMS</span><span class="v" id="s-rms">—</span></span>
      </div>
      <div id="loop-region-stats" hidden>
        <span id="loop-start-time">00:00.000</span>
        <span class="loop-sep">–</span>
        <span id="loop-end-time">00:00.000</span>
      </div>
    </div>
    <footer id="stats">
      <span class="stat"><span class="k" title="Sample peak">SP</span><span class="v" id="m-samplepeak">—</span></span>
      <span class="sep" aria-hidden="true">·</span>
      <span class="stat"><span class="k" title="True peak">TP</span><span class="v" id="m-truepeak">—</span></span>
      <span class="sep" aria-hidden="true">·</span>
      <span class="stat"><span class="k" title="Root mean square">RMS</span><span class="v" id="m-rms">—</span></span>
      <span class="sep" aria-hidden="true">·</span>
      <span class="stat"><span class="k" title="Integrated loudness">LUFS</span><span class="v" id="m-i">—</span></span>
    </footer>
    <script type="module" src="/src/client/app.ts"></script>
  </body>
</html>
